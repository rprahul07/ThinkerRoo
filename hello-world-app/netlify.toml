# Netlify configuration for the UserHub frontend (Vite + React).
# When connecting this repo in Netlify, set the site's "Base directory"
# to `hello-world-app` so Netlify reads this file and builds from here.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Vite 8 requires a modern Node runtime.
  NODE_VERSION = "22"

# SPA fallback: react-router uses BrowserRouter, so every path must serve
# index.html and let the client-side router handle the route.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
